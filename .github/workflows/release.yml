name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Package addon
        run: |
          mkdir -p NaowhUIBypass
          cp NaowhUIBypass.toc NaowhUIBypass.lua NaowhUIBypass/
          zip -r NaowhUIBypass-${{ steps.version.outputs.version }}.zip NaowhUIBypass/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: NaowhUIBypass-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
